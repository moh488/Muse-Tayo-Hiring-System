{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Muuse Tayo Hiring System{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/global_glass.css' %}">
</head>
<body>
  {% if messages %}
  {% for message in messages %}
  <div class="alert alert-{{ message.tags }}" style="margin:1rem;">{{ message }}</div>
  {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
  <script src="{% static 'js/global_theme.js' %}"></script>
</body>
</html>
