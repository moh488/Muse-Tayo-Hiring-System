{% extends 'base.html' %}
{% block title %}Add Candidate{% endblock %}
{% block content %}
<h1 class="page-title">Add New Candidate</h1>
<div class="glass-panel" style="padding:1.5rem;max-width:600px;">
    <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group"><label>{{ field.label }}</label>{{ field }}</div>
    {% endfor %}
    <div class="form-group">
      <label>Apply to Job (optional)</label>
      <select name="job_id" class="form-control">
        <option value="">— Select job —</option>
        {% for job in jobs %}
        <option value="{{ job.id }}">{{ job.reference_code }} — {{ job.title }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn-primary">Save Candidate</button>
  </form>
</div>
<style>input, textarea { width:100%; padding:0.6rem; border-radius:10px; border:1px solid var(--glass-border); background:var(--glass-bg); color:var(--text-primary); }</style>
{% endblock %}
