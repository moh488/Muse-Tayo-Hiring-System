{% extends 'base.html' %}
{% block content %}
<div class="glass-panel" style="padding: 2rem; max-width: 600px; margin: 2rem auto;">
    <h2>Job Applying: {{ job.title }}</h2>
    <hr>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div style="margin-bottom: 1rem;">
            <label>Full_Name:</label>
            <input type="text" name="full_name" class="form-control" required style="width: 100%;">
        </div>

        <div style="margin-bottom: 1rem;">
            <label>Location:</label>
            <input type="text" name="location" class="form-control" required style="width: 100%;">
        </div>

        <div style="margin-bottom: 1rem;">
            <label>Education:</label>
            <textarea name="education" class="form-control" rows="4" required style="width: 100%;"></textarea>
        </div>

        <div style="margin-bottom: 1rem;">
            <label>Resume/PDF:</label>
            <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx" required style="width: 100%;">
        </div>

        <button type="submit" class="form-control" style="background-color: #0d6efd; color: white; cursor: pointer; border: none; padding: 10px; border-radius: 4px;">
            Submit Application
        </button>
    </form>
</div>
{% endblock %}
