{% extends 'base.html' %}
{% block title %}Post a Job{% endblock %}
{% block content %}
<h1 class="page-title">Post a Job Requisition</h1>
<div class="glass-panel" style="padding:1.5rem;max-width:800px;">
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
      <label>{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<div class="alert alert-error">{{ field.errors }}</div>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn-primary">Publish Job</button>
  </form>
</div>
<style>input, select, textarea { width:100%; padding:0.6rem; border-radius:10px; border:1px solid var(--glass-border); background:var(--glass-bg); color:var(--text-primary); }</style>
{% endblock %}
