{% extends 'base.html' %}
{% block title %}Schedule Interview{% endblock %}
{% block content %}
<h1 class="page-title">Schedule Interview</h1>
<div class="glass-panel" style="padding:2rem; max-width:600px;">
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group" style="margin-bottom:1.2rem;">
      <label style="display:block; margin-bottom:0.4rem; font-weight:500;">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<div class="alert alert-error" style="margin-top:0.3rem;">{{ field.errors }}</div>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn-primary" style="margin-top:0.5rem; width:100%; padding:0.75rem; font-size:1rem; cursor:pointer;">
      Save &amp; Go to Interviews →
    </button>
  </form>
</div>
<style>
  input, select, textarea {
    width: 100%;
    padding: 0.6rem;
    border-radius: 10px;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    color: var(--text-primary);
  }
</style>
{% endblock %}
